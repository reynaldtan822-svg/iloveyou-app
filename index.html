<!DOCTYPE html>
<html lang="en">

  <head>

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>MusicHub PH</title>

	<link rel="stylesheet" href="style.css">

	<link rel="manifest" href="manifest.json">

	<meta name="theme-color" content="#00c853">

  </head>

  <body>

	<header>

	  <h1>🎵 MusicHub PH</h1>

	</header>

	<div class="searchBox">

	  <input
		type="text"
		id="search"
		placeholder="Search music on YouTube...">

	</div>

	<div id="musicList"
	  style="
	  padding:20px;
	  color:black;
	  background:white;
	  ">

	</div>

	<div id="toast">

	</div>

	<div class="mini-player">

	  <img
		id="miniCover"
		src="assets/default-cover.png">

	  <div>

		<h3 id="miniTitle">

		  No Music

		</h3>

		<p id="miniArtist">

		  Ready

		</p>

	  </div>

	  <button id="miniPlay">

		▶

	  </button>

	</div>

	<script src="script.js"></script>

  </body>

</html>
